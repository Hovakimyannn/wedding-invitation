<!DOCTYPE html>
<html lang="hy">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Հյուրերի կառավարում — Ադմին</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Georgia, "Noto Serif Armenian", serif;
      background: #faf7f2;
      color: #2b2b2b;
      padding: 32px 16px 64px;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      font-size: 26px;
      font-weight: 400;
      text-align: center;
      letter-spacing: .04em;
      margin-bottom: 6px;
    }

    .sub {
      text-align: center;
      color: #8a8378;
      font-size: 14px;
      margin-bottom: 24px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 2px solid #e7e0d4;
      margin-bottom: 24px;
    }

    .tab-btn {
      font: inherit;
      font-size: 14px;
      padding: 10px 24px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: #8a8378;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color .15s, border-color .15s;
    }

    .tab-btn.active {
      color: #2b2b2b;
      border-bottom-color: #2b2b2b;
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    /* ── Stat cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .card {
      background: #fff;
      border: 1px solid #e7e0d4;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
    }

    .card .num {
      font-size: 28px;
      line-height: 1.1;
    }

    .card .lbl {
      font-size: 12px;
      color: #8a8378;
      margin-top: 4px;
    }

    /* ── Buttons ── */
    .toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 16px;
    }

    button.refresh,
    button.add-table {
      font: inherit;
      font-size: 14px;
      padding: 8px 18px;
      border: 1px solid #2b2b2b;
      border-radius: 999px;
      background: transparent;
      cursor: pointer;
      transition: background .15s, color .15s;
    }

    button.add-table {
      background: #2b2b2b;
      color: #fff;
    }

    button.refresh:hover {
      background: #2b2b2b;
      color: #fff;
    }

    button.add-table:hover {
      background: #444;
    }

    /* ── RSVP table ── */
    .tablebox {
      background: #fff;
      border: 1px solid #e7e0d4;
      border-radius: 10px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th,
    td {
      text-align: left;
      padding: 12px 14px;
      border-bottom: 1px solid #f0ebe1;
      vertical-align: top;
    }

    th {
      font-weight: 400;
      color: #8a8378;
      font-size: 12px;
      letter-spacing: .06em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
    }

    .b-yes {
      background: #e6f2e6;
      color: #2e6b2e;
    }

    .b-pair {
      background: #e6ecf7;
      color: #2f4f8f;
    }

    .b-no {
      background: #f9e6e6;
      color: #a03434;
    }

    .b-later {
      background: #f3efe6;
      color: #8a7434;
    }

    .date {
      color: #8a8378;
      white-space: nowrap;
      font-size: 13px;
    }

    .empty {
      text-align: center;
      padding: 40px 16px;
      color: #8a8378;
    }

    .acts {
      white-space: nowrap;
      text-align: right;
    }

    button.act {
      font: inherit;
      font-size: 13px;
      padding: 4px 10px;
      margin-left: 6px;
      border: 1px solid #d9d2c4;
      border-radius: 999px;
      background: transparent;
      color: #5a544a;
      cursor: pointer;
    }

    button.act:hover {
      border-color: #2b2b2b;
      color: #2b2b2b;
    }

    button.act.danger:hover {
      border-color: #a03434;
      color: #a03434;
    }

    td input[type="text"],
    td select {
      font: inherit;
      font-size: 14px;
      padding: 6px 8px;
      border: 1px solid #d9d2c4;
      border-radius: 6px;
      background: #fff;
      color: #2b2b2b;
      max-width: 100%;
    }

    /* ── SEATING layout ── */
    .seating-layout {
      display: grid;
      grid-template-columns: 210px 1fr;
      gap: 20px;
      align-items: start;
    }

    @media (max-width: 700px) {
      .seating-layout {
        grid-template-columns: 1fr;
      }
    }

    /* Unassigned panel */
    .unassigned-panel {
      background: #fff;
      border: 1px solid #e7e0d4;
      border-radius: 12px;
      padding: 14px;
      position: sticky;
      top: 16px;
    }

    .unassigned-panel h3 {
      font-size: 11px;
      font-weight: 400;
      color: #8a8378;
      letter-spacing: .07em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .guest-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 10px;
      margin-bottom: 5px;
      background: #faf7f2;
      border: 1px solid #e7e0d4;
      border-radius: 8px;
      font-size: 13px;
      cursor: grab;
      user-select: none;
      transition: background .12s, border-color .12s, box-shadow .12s;
    }

    .guest-chip:hover {
      background: #f0ebe1;
      border-color: #c9c0b0;
    }

    .guest-chip.dragging {
      opacity: .4;
      box-shadow: none;
    }

    .guest-chip-text {
      display: flex;
      flex-direction: column;
      gap: 1px;
      min-width: 0;
    }

    .guest-chip-host {
      font-size: 11px;
      color: #8a8378;
      line-height: 1.2;
    }

    .c-host {
      color: #6a6358;
      font-size: 13px;
    }

    .c-host.muted {
      color: #b0a89c;
    }

    .att-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-yes {
      background: #5aad5a;
    }

    .dot-pair {
      background: #5a7fd4;
    }

    .dot-no {
      background: #d45a5a;
    }

    .dot-later {
      background: #c4a84a;
    }

    /* Tables visual grid */
    .tables-visual-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
      align-items: flex-start;
    }

    .table-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .table-block-header {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      justify-content: center;
    }

    .table-block-name {
      font-size: 14px;
      font-weight: 400;
      text-align: center;
    }

    .table-block-cap {
      font-size: 11px;
      color: #8a8378;
      background: #f0ebe1;
      border-radius: 999px;
      padding: 2px 7px;
    }

    .table-block-actions {
      display: flex;
      gap: 4px;
    }

    button.icon-btn {
      font: inherit;
      font-size: 12px;
      padding: 2px 7px;
      border: 1px solid #d9d2c4;
      border-radius: 999px;
      background: transparent;
      color: #8a8378;
      cursor: pointer;
      transition: all .12s;
    }

    button.icon-btn:hover {
      color: #2b2b2b;
      border-color: #2b2b2b;
    }

    button.icon-btn.danger:hover {
      color: #a03434;
      border-color: #a03434;
    }

    /* SVG table */
    .table-svg-wrap {
      position: relative;
      user-select: none;
    }

    .seat-node {
      cursor: pointer;
      transition: filter .1s;
    }

    .seat-node:hover .seat-circle {
      filter: brightness(.92);
    }

    .seat-node.drag-over .seat-circle {
      stroke: #8a7434 !important;
      stroke-width: 2.5 !important;
      fill: #fdf8ea !important;
    }

    .seat-node.occupied .seat-circle {
      fill: #e8f0e8;
      stroke: #a0c8a0;
    }

    .seat-name {
      font-size: 9.5px;
      text-anchor: middle;
      dominant-baseline: middle;
      fill: #2b2b2b;
      pointer-events: none;
    }

    .seat-num {
      font-size: 9px;
      text-anchor: middle;
      dominant-baseline: middle;
      fill: #b0a898;
      pointer-events: none;
    }

    .seat-x {
      font-size: 11px;
      text-anchor: middle;
      dominant-baseline: middle;
      fill: #b0a898;
      cursor: pointer;
    }

    .seat-x:hover {
      fill: #a03434;
    }

    /* table surface */
    .table-surface-round {
      fill: #f5f0e8;
      stroke: #d9d2c4;
      stroke-width: 1.5;
    }

    .table-surface-rect {
      fill: #f5f0e8;
      stroke: #d9d2c4;
      stroke-width: 1.5;
      rx: 8;
    }

    .table-label {
      font-size: 12px;
      text-anchor: middle;
      dominant-baseline: middle;
      fill: #8a8378;
      pointer-events: none;
    }

    .seating-empty {
      text-align: center;
      padding: 40px 16px;
      color: #8a8378;
      font-size: 14px;
    }

    /* Enlarged table view */
    .table-svg-wrap .table-surface-round,
    .table-svg-wrap .table-surface-rect {
      cursor: zoom-in;
    }

    .modal.bigview {
      width: auto;
      max-width: 94vw;
      max-height: 92vh;
      overflow: auto;
    }

    .bigview-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 8px;
    }

    #bigview-svg {
      text-align: center;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .35);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: #fff;
      border-radius: 14px;
      padding: 28px 28px 22px;
      width: 340px;
      max-width: 95vw;
      box-shadow: 0 8px 40px rgba(0, 0, 0, .18);
    }

    .modal h2 {
      font-size: 18px;
      font-weight: 400;
      margin-bottom: 18px;
    }

    .modal label {
      display: block;
      font-size: 13px;
      color: #5a544a;
      margin-bottom: 4px;
      margin-top: 14px;
    }

    .modal input[type="text"],
    .modal input[type="number"],
    .modal select {
      font: inherit;
      font-size: 14px;
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d9d2c4;
      border-radius: 8px;
      background: #faf7f2;
      color: #2b2b2b;
    }

    .shape-btns {
      display: flex;
      gap: 10px;
      margin-top: 6px;
    }

    .shape-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 10px 6px;
      border: 2px solid #d9d2c4;
      border-radius: 10px;
      background: #faf7f2;
      cursor: pointer;
      transition: border-color .12s, background .12s;
      font: inherit;
      font-size: 12px;
      color: #5a544a;
    }

    .shape-btn.selected {
      border-color: #2b2b2b;
      background: #f0ebe1;
      color: #2b2b2b;
    }

    .shape-btn svg {
      display: block;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 20px;
      justify-content: flex-end;
    }

    .modal-actions button {
      font: inherit;
      font-size: 14px;
      padding: 8px 20px;
      border-radius: 999px;
      border: 1px solid #d9d2c4;
      background: transparent;
      cursor: pointer;
    }

    .modal-actions .btn-primary {
      background: #2b2b2b;
      color: #fff;
      border-color: #2b2b2b;
    }

    .modal-actions .btn-primary:hover {
      background: #444;
    }

    .modal-actions button:not(.btn-primary):hover {
      border-color: #2b2b2b;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Հարություն &amp; Մարինե — 26.08.2026</h1>
    <p class="sub">Ադմին կառավարում</p>

    <div class="tabs">
      <button class="tab-btn active" data-tab="rsvp">Հյուրեր (RSVP)</button>
      <button class="tab-btn" data-tab="seating">Նստատեղեր</button>
    </div>

    <!-- ════ RSVP TAB ════ -->
    <div class="tab-panel active" id="tab-rsvp">
      <div class="cards">
        <div class="card">
          <div class="num" id="c-total">–</div>
          <div class="lbl">Ընդամենը</div>
        </div>
        <div class="card">
          <div class="num" id="c-guests">–</div>
          <div class="lbl">Սպասվող հյուր</div>
        </div>
        <div class="card">
          <div class="num" id="c-yes">–</div>
          <div class="lbl">Կգան</div>
        </div>
        <div class="card">
          <div class="num" id="c-no">–</div>
          <div class="lbl">Չեն գա</div>
        </div>
        <div class="card">
          <div class="num" id="c-later">–</div>
          <div class="lbl">Կտեղեկացնեն</div>
        </div>
      </div>
      <div class="toolbar">
        <button class="refresh" id="refresh" type="button">Թարմացնել</button>
      </div>
      <div class="tablebox">
        <table>
          <thead>
            <tr>
              <th>Անուն</th>
              <th>Ում հյուրն է</th>
              <th>Ներկայություն</th>
              <th>Ամսաթիվ</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
        <div class="empty" id="empty" hidden>Դեռ պատասխաններ չկան</div>
      </div>
    </div>

    <!-- ════ SEATING TAB ════ -->
    <div class="tab-panel" id="tab-seating">
      <div class="toolbar">
        <button class="add-table" id="add-table-btn" type="button">+ Ավելացնել սեղան</button>
      </div>
      <div class="seating-layout">
        <div class="unassigned-panel">
          <h3>Չնշանակված հյուրեր</h3>
          <div id="unassigned-list">
            <div class="empty" style="padding:16px 0">Բեռնվում է…</div>
          </div>
        </div>
        <div id="tables-visual-grid" class="tables-visual-grid">
          <div class="seating-empty">Բեռնվում է…</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ════ Modal: add / edit table ════ -->
  <div class="modal-overlay" id="table-modal">
    <div class="modal">
      <h2 id="modal-title">Ավելացնել սեղան</h2>
      <label>Անուն</label>
      <input type="text" id="modal-name" maxlength="60" placeholder="օր. Ընտանիք" />
      <label>Տեղերի քանակ</label>
      <input type="number" id="modal-cap" min="1" max="50" value="8" />
      <label>Ձև</label>
      <div class="shape-btns">
        <button class="shape-btn selected" data-shape="round" id="shape-round" type="button">
          <svg width="40" height="40" viewBox="0 0 40 40">
            <circle cx="20" cy="20" r="16" fill="#f0ebe1" stroke="#c9c0b0" stroke-width="1.5" />
            <circle cx="20" cy="4" r="3" fill="#a09080" />
            <circle cx="36" cy="20" r="3" fill="#a09080" />
            <circle cx="20" cy="36" r="3" fill="#a09080" />
            <circle cx="4" cy="20" r="3" fill="#a09080" />
          </svg>
          Կլոր
        </button>
        <button class="shape-btn" data-shape="rect" id="shape-rect" type="button">
          <svg width="40" height="40" viewBox="0 0 40 40">
            <rect x="4" y="10" width="32" height="20" rx="4" fill="#f0ebe1" stroke="#c9c0b0" stroke-width="1.5" />
            <circle cx="12" cy="5" r="3" fill="#a09080" />
            <circle cx="28" cy="5" r="3" fill="#a09080" />
            <circle cx="12" cy="35" r="3" fill="#a09080" />
            <circle cx="28" cy="35" r="3" fill="#a09080" />
            <circle cx="3" cy="20" r="3" fill="#a09080" />
            <circle cx="37" cy="20" r="3" fill="#a09080" />
          </svg>
          Ուղղ.
        </button>
      </div>
      <div class="modal-actions">
        <button type="button" id="modal-cancel">Չեղարկել</button>
        <button type="button" id="modal-save" class="btn-primary">Պահպանել</button>
      </div>
    </div>
  </div>

  <!-- ════ Modal: enlarged table view ════ -->
  <div class="modal-overlay" id="bigview-overlay">
    <div class="modal bigview">
      <div class="bigview-head">
        <h2 id="bigview-title"></h2>
        <button class="icon-btn" id="bigview-close" type="button">✕</button>
      </div>
      <div id="bigview-svg"></div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════
    //  Shared helpers
    // ═══════════════════════════════════════
    var ATT = {
      yes: { label: "Կգա", cls: "b-yes", seats: 1, dot: "dot-yes" },
      pair: { label: "Կգա զույգով", cls: "b-pair", seats: 2, dot: "dot-pair" },
      no: { label: "Չի գա", cls: "b-no", seats: 0, dot: "dot-no" },
      later: { label: "Կտեղ. ավելի ուշ", cls: "b-later", seats: 0, dot: "dot-later" }
    };
    function esc(s) {
      return String(s).replace(/[&<>"']/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
      });
    }
    function fmtDate(iso) {
      var d = new Date(iso); if (isNaN(d)) return "";
      var p = function (n) { return n < 10 ? "0" + n : n; };
      return p(d.getDate()) + "." + p(d.getMonth() + 1) + "." + d.getFullYear() + " " + p(d.getHours()) + ":" + p(d.getMinutes());
    }
    var SVG_NS = "http://www.w3.org/2000/svg";

    function expandRsvpGuests(r, includeExtras) {
      if (includeExtras == null) {
        includeExtras = r.attending === "yes" || r.attending === "pair";
      }
      var guests = [{
        id: r.id,
        name: r.name || "",
        rsvpId: r.id,
        hostName: null,
        isPrimary: true,
        attending: r.attending
      }];
      if (!includeExtras) return guests;
      var extraNames = Array.isArray(r.guestNames) ? r.guestNames.slice() : [];
      // "pair" without named extras still reserves a second seat for the partner.
      if (r.attending === "pair" && extraNames.length === 0) {
        extraNames = [""];
      }
      extraNames.forEach(function (name, i) {
        guests.push({
          id: r.id + ":g" + i,
          name: name || "Զույգ",
          rsvpId: r.id,
          hostName: r.name || "",
          isPrimary: false,
          attending: r.attending
        });
      });
      return guests;
    }

    function buildGuestMap(rsvps) {
      var map = {};
      rsvps.forEach(function (r) {
        expandRsvpGuests(r, true).forEach(function (g) { map[g.id] = g; });
      });
      return map;
    }

    function comingGuests(rsvps) {
      return rsvps
        .filter(function (r) { return r.attending === "yes" || r.attending === "pair"; })
        .reduce(function (all, r) { return all.concat(expandRsvpGuests(r, true)); }, []);
    }

    // ═══════════════════════════════════════
    //  Tabs
    // ═══════════════════════════════════════
    document.querySelectorAll(".tab-btn").forEach(function (btn) {
      btn.addEventListener("click", function () {
        document.querySelectorAll(".tab-btn").forEach(function (b) { b.classList.remove("active"); });
        document.querySelectorAll(".tab-panel").forEach(function (p) { p.classList.remove("active"); });
        btn.classList.add("active");
        document.getElementById("tab-" + btn.dataset.tab).classList.add("active");
        if (btn.dataset.tab === "seating") loadSeating();
      });
    });

    // ═══════════════════════════════════════
    //  RSVP TAB
    // ═══════════════════════════════════════
    var DATA = /*__RSVPS__*/[];

    function renderRsvp(list) {
      list = list.slice().sort(function (a, b) { return (b.createdAt || "").localeCompare(a.createdAt || ""); });
      var guests = 0, yes = 0, no = 0, later = 0, html = "";
      list.forEach(function (r) {
        var att = ATT[r.attending] || ATT.later;
        var coming = r.attending === "yes" || r.attending === "pair";
        var guestRows = expandRsvpGuests(r);
        if (coming) guests += guestRows.length;
        if (coming) yes++;
        else if (r.attending === "no") no++;
        else later++;

        guestRows.forEach(function (g) {
          var hostCell = g.isPrimary
            ? '<span class="c-host muted">—</span>'
            : '<span class="c-host">' + esc(g.hostName) + "-ի հյուր</span>";
          var actsCell = g.isPrimary
            ? '<button class="act" data-do="edit" type="button">Խմբ.</button>' +
              '<button class="act danger" data-do="del" type="button">Ջնջ.</button>'
            : "";
          var rowAttrs = g.isPrimary ? ' data-id="' + esc(r.id || "") + '"' : ' data-rsvp-id="' + esc(r.id || "") + '"';
          html += "<tr" + rowAttrs + ">" +
            '<td class="c-name">' + esc(g.name) + "</td>" +
            "<td>" + hostCell + "</td>" +
            '<td class="c-att" data-att="' + esc(r.attending || "later") + '"><span class="badge ' + att.cls + '">' + att.label + "</span></td>" +
            '<td class="date">' + fmtDate(r.createdAt) + "</td>" +
            '<td class="acts">' + actsCell + "</td></tr>";
        });
      });
      document.getElementById("rows").innerHTML = html;
      document.getElementById("empty").hidden = list.length > 0;
      document.getElementById("c-total").textContent = list.length;
      document.getElementById("c-guests").textContent = guests;
      document.getElementById("c-yes").textContent = yes;
      document.getElementById("c-no").textContent = no;
      document.getElementById("c-later").textContent = later;
    }

    function apiRsvp(method, id, body) {
      return fetch("/admin/api/rsvps/" + encodeURIComponent(id), {
        method: method, headers: body ? { "Content-Type": "application/json" } : undefined,
        body: body ? JSON.stringify(body) : undefined
      }).then(function (r) {
        if (r.status === 401) { location.reload(); throw new Error("auth"); }
        return r.json().then(function (d) { if (!r.ok || !d.ok) throw new Error(d.error || r.status); return d; });
      });
    }

    function startEdit(tr) {
      var nameTd = tr.querySelector(".c-name"), attTd = tr.querySelector(".c-att"), actsTd = tr.querySelector(".acts");
      var oldName = nameTd.textContent, oldAtt = attTd.getAttribute("data-att");
      nameTd.innerHTML = ""; var inp = document.createElement("input"); inp.type = "text"; inp.value = oldName; nameTd.appendChild(inp);
      attTd.innerHTML = ""; var sel = document.createElement("select");
      Object.keys(ATT).forEach(function (k) { var o = document.createElement("option"); o.value = k; o.textContent = ATT[k].label; if (k === oldAtt) o.selected = true; sel.appendChild(o); });
      attTd.appendChild(sel);
      actsTd.innerHTML = '<button class="act" data-do="save" type="button">Պահ.</button><button class="act" data-do="cancel" type="button">Չեղ.</button>';
      inp.focus();
    }

    document.getElementById("rows").addEventListener("click", function (e) {
      var btn = e.target.closest("button.act"); if (!btn) return;
      var tr = btn.closest("tr"), id = tr.getAttribute("data-id"), act = btn.getAttribute("data-do");
      if (act === "del") {
        var who = tr.querySelector(".c-name").textContent;
        if (!confirm("Ջնջե՞լ «" + who + "» պատասխանը։")) return;
        apiRsvp("DELETE", id).then(function () { location.reload(); }).catch(function (err) { alert("Չհաջողվեց ջնջել։ " + err.message); });
      } else if (act === "edit") {
        startEdit(tr);
      } else if (act === "cancel") {
        renderRsvp(DATA);
      } else if (act === "save") {
        var name = tr.querySelector(".c-name input").value.trim(), attending = tr.querySelector(".c-att select").value;
        if (!name) { alert("Անունը պարտադիր է"); return; }
        apiRsvp("PUT", id, { name, attending }).then(function () { location.reload(); }).catch(function (err) { alert("Չհաջողվեց:" + err.message); });
      }
    });
    document.getElementById("refresh").addEventListener("click", function () { location.reload(); });
    renderRsvp(DATA);

    // ═══════════════════════════════════════
    //  SEATING TAB
    // ═══════════════════════════════════════
    var seatingData = { tables: [], rsvps: [] };
    var seatingLoaded = false;
    var dragGuestId = null;

    function apiSeating(method, url, body) {
      return fetch(url, {
        method: method, headers: body ? { "Content-Type": "application/json" } : undefined,
        body: body ? JSON.stringify(body) : undefined
      }).then(function (r) {
        if (r.status === 401) { location.reload(); throw new Error("auth"); }
        return r.json().then(function (d) { if (!r.ok || !d.ok) throw new Error(d.error || r.status); return d; });
      });
    }

    function loadSeating() {
      return apiSeating("GET", "/admin/api/seating").then(function (d) {
        seatingData = d; seatingLoaded = true; renderSeating();
      }).catch(function (err) {
        document.getElementById("tables-visual-grid").innerHTML = '<div class="seating-empty">Չհաջողվեց: ' + esc(err.message) + "</div>";
      });
    }

    function assignedMap() {
      var m = {}; seatingData.tables.forEach(function (t) { t.seats.forEach(function (s) { if (s.guestId) m[s.guestId] = true; }); });
      return m;
    }

    // ── Truncate name to fit in a seat circle
    function truncName(n, maxLen) {
      maxLen = maxLen || 11;
      if (!n) return "";
      // take first name only if has space
      var parts = n.trim().split(/\s+/);
      var s = parts[0];
      if (s.length > maxLen) s = s.slice(0, maxLen - 1) + "…";
      return s;
    }

    // ── Build <g> seat element for SVG
    function makeSeatEl(x, y, r, pos, guest, tableId) {
      var g = document.createElementNS(SVG_NS, "g");
      g.classList.add("seat-node");
      g.setAttribute("data-table-id", tableId);
      g.setAttribute("data-pos", pos);
      if (guest) g.classList.add("occupied");

      var circle = document.createElementNS(SVG_NS, "circle");
      circle.classList.add("seat-circle");
      circle.setAttribute("cx", x);
      circle.setAttribute("cy", y);
      circle.setAttribute("r", r);
      circle.setAttribute("fill", guest ? "#e8f0e8" : "#fff");
      circle.setAttribute("stroke", guest ? "#a0c8a0" : "#d9d2c4");
      circle.setAttribute("stroke-width", "1.5");
      g.appendChild(circle);

      if (guest) {
        var txt = document.createElementNS(SVG_NS, "text");
        txt.classList.add("seat-name");
        txt.setAttribute("x", x);
        txt.setAttribute("y", y + 1);
        txt.setAttribute("font-size", Math.max(8.5, Math.round(r * 0.42)));
        if (guest.hostName) txt.setAttribute("title", guest.hostName + "-ի հյուր");
        txt.textContent = truncName(guest.name, Math.floor(r / 3));
        g.appendChild(txt);

        // × unassign button
        var xBtn = document.createElementNS(SVG_NS, "text");
        xBtn.classList.add("seat-x");
        xBtn.setAttribute("x", x + r * 0.6);
        xBtn.setAttribute("y", y - r * 0.6);
        xBtn.setAttribute("font-size", Math.max(10, Math.round(r * 0.45)));
        xBtn.setAttribute("data-unassign", guest.id);
        xBtn.textContent = "×";
        g.appendChild(xBtn);
      } else {
        var numTxt = document.createElementNS(SVG_NS, "text");
        numTxt.classList.add("seat-num");
        numTxt.setAttribute("x", x);
        numTxt.setAttribute("y", y + 1);
        numTxt.setAttribute("font-size", Math.max(9, Math.round(r * 0.38)));
        numTxt.textContent = pos;
        g.appendChild(numTxt);
      }
      return g;
    }

    // ── Draw one table as SVG. `scale` > 1 renders an enlarged version
    //    (used by the big view popup).
    function drawTable(t, guestMap, scale) {
      scale = scale || 1;
      var shape = t.shape || "round";
      var n = t.seats.length;
      var SR = Math.max(18, Math.min(28, Math.floor(300 / n))) * scale; // seat radius
      // full clearance for the seat ring: seats stick out 2×SR past the
      // table edge, so the margin must cover that (the old PAD clipped them)
      var PAD = SR * 2 + 10;

      var svgW, svgH, cx, cy, tableEl;

      if (shape === "round") {
        // Circular arrangement
        var TR = Math.max(50 * scale, Math.ceil(n * (SR * 2 + 8) / (2 * Math.PI))); // table radius
        svgW = (TR + PAD) * 2;
        svgH = svgW;
        cx = svgW / 2;
        cy = svgH / 2;

        var svg = document.createElementNS(SVG_NS, "svg");
        svg.setAttribute("width", svgW);
        svg.setAttribute("height", svgH);
        svg.setAttribute("viewBox", "0 0 " + svgW + " " + svgH);

        // table surface
        tableEl = document.createElementNS(SVG_NS, "circle");
        tableEl.classList.add("table-surface-round");
        tableEl.setAttribute("cx", cx);
        tableEl.setAttribute("cy", cy);
        tableEl.setAttribute("r", TR - 2);
        svg.appendChild(tableEl);

        // table name
        var lbl = document.createElementNS(SVG_NS, "text");
        lbl.classList.add("table-label");
        lbl.setAttribute("x", cx); lbl.setAttribute("y", cy);
        lbl.setAttribute("font-size", Math.round(12 * scale));
        // just show seat count
        lbl.textContent = n + " տ.";
        svg.appendChild(lbl);

        // seats around perimeter
        t.seats.forEach(function (s, i) {
          var angle = (2 * Math.PI * i / n) - Math.PI / 2;
          var sx = cx + (TR + SR + 2) * Math.cos(angle);
          var sy = cy + (TR + SR + 2) * Math.sin(angle);
          var guest = s.guestId ? guestMap[s.guestId] : null;
          svg.appendChild(makeSeatEl(sx, sy, SR, s.pos, guest, t.id));
        });
        return svg;

      } else {
        // Rectangular arrangement
        // seats on top and bottom, remainder on sides
        var topN = Math.ceil(n / 2);
        var bottomN = Math.floor(n / 2);
        var sideN = 0;
        // if n > 8 use sides too
        if (n > 8) {
          var perSide = Math.floor((n - 8) / 2);
          topN = 4;
          bottomN = 4;
          sideN = perSide;
          // distribute remainder
          if (n - 8 - perSide * 2 > 0) topN += 1;
        }

        var GAP = SR * 2 + 6;
        var tableW = Math.max(topN, bottomN) * GAP + 16;
        var tableH = Math.max(60 * scale, sideN > 0 ? (sideN * GAP + 16) : 56 * scale);

        svgW = tableW + PAD * 2;
        svgH = tableH + PAD * 2;
        cx = svgW / 2;
        cy = svgH / 2;
        var tx = cx - tableW / 2;
        var ty = cy - tableH / 2;

        var svg = document.createElementNS(SVG_NS, "svg");
        svg.setAttribute("width", svgW);
        svg.setAttribute("height", svgH);
        svg.setAttribute("viewBox", "0 0 " + svgW + " " + svgH);

        var rect = document.createElementNS(SVG_NS, "rect");
        rect.setAttribute("x", tx); rect.setAttribute("y", ty);
        rect.setAttribute("width", tableW); rect.setAttribute("height", tableH);
        rect.setAttribute("rx", "10");
        rect.classList.add("table-surface-rect");
        svg.appendChild(rect);

        var lbl2 = document.createElementNS(SVG_NS, "text");
        lbl2.classList.add("table-label");
        lbl2.setAttribute("x", cx); lbl2.setAttribute("y", cy);
        lbl2.setAttribute("font-size", Math.round(12 * scale));
        lbl2.textContent = n + " տ.";
        svg.appendChild(lbl2);

        // position seats
        var seatIdx = 0;
        function addSeat(sx, sy) {
          if (seatIdx >= t.seats.length) return;
          var s = t.seats[seatIdx++];
          var guest = s.guestId ? guestMap[s.guestId] : null;
          svg.appendChild(makeSeatEl(sx, sy, SR, s.pos, guest, t.id));
        }

        // top row
        var topCount = topN;
        var topStart = cx - (topCount - 1) * GAP / 2;
        for (var i = 0; i < topCount; i++) addSeat(topStart + i * GAP, ty - SR - 4);

        // right side
        if (sideN > 0) {
          var sideStart = cy - (sideN - 1) * GAP / 2;
          for (var i = 0; i < sideN; i++) addSeat(tx + tableW + SR + 4, sideStart + i * GAP);
        }

        // bottom row
        var botCount = bottomN;
        var botStart = cx - (botCount - 1) * GAP / 2;
        for (var i = 0; i < botCount; i++) addSeat(botStart + i * GAP, ty + tableH + SR + 4);

        // left side
        if (sideN > 0) {
          var sideStart = cy - (sideN - 1) * GAP / 2;
          for (var i = 0; i < sideN; i++) addSeat(tx - SR - 4, sideStart + i * GAP);
        }

        return svg;
      }
    }

    function renderSeating() {
      var assigned = assignedMap();
      var allGuests = comingGuests(seatingData.rsvps);
      var guestMap = buildGuestMap(seatingData.rsvps);
      var unassigned = allGuests.filter(function (g) { return !assigned[g.id]; });

      // ── Unassigned chips ──
      var ulEl = document.getElementById("unassigned-list");
      if (unassigned.length === 0) {
        ulEl.innerHTML = '<div style="font-size:13px;color:#8a8378;padding:8px 0">Բոլոր հյուրերը նստեցված են ✓</div>';
      } else {
        ulEl.innerHTML = unassigned.map(function (g) {
          var att = ATT[g.attending] || ATT.later;
          var hostHint = g.hostName
            ? '<span class="guest-chip-host">' + esc(g.hostName) + "-ի հյուր</span>"
            : "";
          return '<div class="guest-chip" draggable="true" data-guest-id="' + esc(g.id) + '">' +
            '<span class="att-dot ' + att.dot + '"></span>' +
            '<span class="guest-chip-text"><span>' + esc(g.name) + "</span>" + hostHint + "</span></div>";
        }).join("");
        ulEl.querySelectorAll(".guest-chip").forEach(function (chip) {
          chip.addEventListener("dragstart", function (e) {
            dragGuestId = chip.getAttribute("data-guest-id");
            chip.classList.add("dragging");
            e.dataTransfer.effectAllowed = "move";
          });
          chip.addEventListener("dragend", function () { chip.classList.remove("dragging"); });
        });
      }

      // ── Tables ──
      var grid = document.getElementById("tables-visual-grid");
      if (seatingData.tables.length === 0) {
        grid.innerHTML = '<div class="seating-empty">Սեղաններ չկան։ Սեղմեք «+ Ավելացնել սեղան»</div>';
        return;
      }

      grid.innerHTML = "";
      seatingData.tables.forEach(function (t) {
        var block = document.createElement("div");
        block.className = "table-block";

        // header
        var hdr = document.createElement("div");
        hdr.className = "table-block-header";
        hdr.innerHTML =
          '<span class="table-block-name">' + esc(t.name) + '</span>' +
          '<span class="table-block-cap">' + t.capacity + ' տ.</span>' +
          '<div class="table-block-actions">' +
          '<button class="icon-btn" data-do="edit-table" data-id="' + esc(t.id) + '">✎</button>' +
          '<button class="icon-btn danger" data-do="del-table" data-id="' + esc(t.id) + '">✕</button>' +
          '</div>';
        block.appendChild(hdr);

        // SVG visual
        var svgWrap = document.createElement("div");
        svgWrap.className = "table-svg-wrap";
        var svg = drawTable(t, guestMap);
        svgWrap.appendChild(svg);
        block.appendChild(svgWrap);

        // clicking the table surface (not a seat) opens the enlarged view
        svgWrap.addEventListener("click", function (e) {
          if (e.target.closest(".seat-node") || e.target.closest(".seat-x")) return;
          openBigView(t.id);
        });

        grid.appendChild(block);
      });

      // ── Bind seat drag-drop ──
      grid.querySelectorAll(".seat-node").forEach(function (g) {
        var tableId = g.getAttribute("data-table-id");
        var pos = Number(g.getAttribute("data-pos"));

        // Allow occupied seats to start a drag
        if (g.classList.contains("occupied")) {
          g.addEventListener("dragstart", function (e) {
            var xBtn = g.querySelector("[data-unassign]");
            if (!xBtn) return e.preventDefault();
            dragGuestId = xBtn.getAttribute("data-unassign");
            e.dataTransfer.effectAllowed = "move";
          });
          g.setAttribute("draggable", "true");
        }

        // unassign × click
        var xBtn = g.querySelector(".seat-x");
        if (xBtn) {
          xBtn.addEventListener("click", function (e) {
            e.stopPropagation();
            var gid = xBtn.getAttribute("data-unassign");
            apiSeating("PUT", "/admin/api/seating/assign", { guestId: gid })
              .then(function () { return loadSeating(); })
              .catch(function (err) { alert("Չհաջողվեց հանել: " + err.message); });
          });
        }

        if (!g.classList.contains("occupied")) {
          g.addEventListener("dragover", function (e) {
            e.preventDefault();
            g.classList.add("drag-over");
          });
          g.addEventListener("dragleave", function () {
            g.classList.remove("drag-over");
          });
          g.addEventListener("drop", function (e) {
            e.preventDefault();
            g.classList.remove("drag-over");
            if (!dragGuestId) return;
            apiSeating("PUT", "/admin/api/seating/assign", { guestId: dragGuestId, tableId: tableId, pos: pos })
              .then(function () { dragGuestId = null; return loadSeating(); })
              .catch(function (err) { alert("Չհաջողվեց նշ.: " + err.message); });
          });
        }
      });

      // ── Table edit / delete buttons ──
      grid.querySelectorAll("[data-do='del-table']").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var tid = btn.getAttribute("data-id");
          var tbl = seatingData.tables.find(function (x) { return x.id === tid; });
          if (!confirm("Ջնջե՞լ «" + (tbl ? tbl.name : "") + "» սեղանը։")) return;
          apiSeating("DELETE", "/admin/api/tables/" + encodeURIComponent(tid))
            .then(function () { return loadSeating(); })
            .catch(function (err) { alert("Չհաջողվ.: " + err.message); });
        });
      });

      grid.querySelectorAll("[data-do='edit-table']").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var tid = btn.getAttribute("data-id");
          var tbl = seatingData.tables.find(function (x) { return x.id === tid; });
          if (!tbl) return;
          openModal(tbl);
        });
      });
    }

    // ═══════════════════════════════════════
    //  Modal (add / edit table)
    // ═══════════════════════════════════════
    var modalEditId = null;
    var selectedShape = "round";

    // ── Enlarged table view ──
    function openBigView(tid) {
      var t = seatingData.tables.find(function (x) { return x.id === tid; });
      if (!t) return;
      var guestMap = buildGuestMap(seatingData.rsvps);

      var seated = t.seats.filter(function (s) { return s.guestId; }).length;
      document.getElementById("bigview-title").textContent =
        t.name + " — " + seated + "/" + t.capacity + " տեղ";

      var box = document.getElementById("bigview-svg");
      box.innerHTML = "";
      var svg = drawTable(t, guestMap, 2);
      svg.style.pointerEvents = "none"; // view only, no drag targets here
      box.appendChild(svg);

      document.getElementById("bigview-overlay").classList.add("open");
    }

    document.getElementById("bigview-close").addEventListener("click", function () {
      document.getElementById("bigview-overlay").classList.remove("open");
    });
    document.getElementById("bigview-overlay").addEventListener("click", function (e) {
      if (e.target === this) this.classList.remove("open");
    });

    function openModal(tbl) {
      modalEditId = tbl ? tbl.id : null;
      document.getElementById("modal-title").textContent = tbl ? "Խմբագրել սեղան" : "Ավելացնել սեղան";
      document.getElementById("modal-name").value = tbl ? tbl.name : "";
      document.getElementById("modal-cap").value = tbl ? tbl.capacity : 8;
      selectedShape = tbl ? (tbl.shape || "round") : "round";
      updateShapeBtns();
      document.getElementById("table-modal").classList.add("open");
      document.getElementById("modal-name").focus();
    }

    function closeModal() {
      document.getElementById("table-modal").classList.remove("open");
      modalEditId = null;
    }

    function updateShapeBtns() {
      document.querySelectorAll(".shape-btn").forEach(function (b) {
        b.classList.toggle("selected", b.dataset.shape === selectedShape);
      });
    }

    document.querySelectorAll(".shape-btn").forEach(function (b) {
      b.addEventListener("click", function () { selectedShape = b.dataset.shape; updateShapeBtns(); });
    });
    document.getElementById("modal-cancel").addEventListener("click", closeModal);
    document.getElementById("table-modal").addEventListener("click", function (e) {
      if (e.target === this) closeModal();
    });

    document.getElementById("modal-save").addEventListener("click", function () {
      var name = document.getElementById("modal-name").value.trim();
      var cap = parseInt(document.getElementById("modal-cap").value, 10);
      if (!name) { alert("Անունը պարտադիր է"); return; }
      if (!cap || cap < 1 || cap > 50) { alert("Տեղ՝ 1-50"); return; }

      var payload = { name: name, capacity: cap, shape: selectedShape };

      if (modalEditId) {
        apiSeating("PUT", "/admin/api/tables/" + encodeURIComponent(modalEditId), payload)
          .then(function () { closeModal(); return loadSeating(); })
          .catch(function (err) { alert("Չհաջողվ.: " + err.message); });
      } else {
        apiSeating("POST", "/admin/api/tables", payload)
          .then(function () { closeModal(); return loadSeating(); })
          .catch(function (err) { alert("Չհաջողվ.: " + err.message); });
      }
    });

    document.getElementById("add-table-btn").addEventListener("click", function () {
      if (!seatingLoaded) {
        loadSeating().then(function () { openModal(null); });
      } else {
        openModal(null);
      }
    });
  </script>
</body>
