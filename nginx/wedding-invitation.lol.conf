# Nginx server block for wedding-invitation.lol
# Drop this file in /etc/nginx/sites-available/wedding-invitation.lol
# and symlink: ln -s /etc/nginx/sites-available/wedding-invitation.lol /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name wedding-invitation.lol www.wedding-invitation.lol;

    # Certbot ACME challenge (needed for Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect HTTP → HTTPS once cert is obtained (uncomment after certbot)
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # --- Proxy to Docker container (comment this block out once HTTPS redirect is active) ---
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

